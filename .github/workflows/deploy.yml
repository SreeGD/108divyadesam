name: Deploy site to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: site/pnpm-lock.yaml
      - name: Build site
        working-directory: site
        # Defaults to the project-page URL + base path (https://<owner>.github.io/<repo>/).
        # For a custom domain or user/org page, set repo Variables (Settings → Secrets and
        # variables → Actions → Variables): SITE_URL=https://yourdomain  and  BASE_PATH=/
        env:
          SITE_URL: ${{ vars.SITE_URL || format('https://{0}.github.io/{1}', github.repository_owner, github.event.repository.name) }}
          BASE_PATH: ${{ vars.BASE_PATH || format('/{0}/', github.event.repository.name) }}
        run: |
          pnpm install --no-frozen-lockfile
          pnpm build
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
